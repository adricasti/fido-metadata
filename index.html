<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIDO Metadata Explorer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="header-content">
      <div class="header-title">
        <h1>FIDO Metadata Explorer</h1>
        <p class="subtitle">Explore <a href="https://fidoalliance.org/certification/authenticator-certification-levels/" target="_blank">FIDO certified authenticators</a> details</p>
      </div>
      <span id="metadata-version" class="header-meta"></span>
    </div>
  </header>

  <main>
    <div class="filter-bar">
      <div class="search-box">
        <input type="text" id="search-input" placeholder="Search devices…" autocomplete="off">
      </div>
      <div class="filter-chips" id="filter-chips"></div>
      <button id="clear-filters" class="btn-clear hidden">Clear all</button>
      <button id="toggle-filters" class="btn-filter">⚙ Filters</button>
    </div>

    <div id="filter-panel" class="filter-panel hidden">
      <div class="filter-group">
        <h3>Protocol</h3>
        <div class="filter-options" id="filter-protocol"></div>
      </div>
      <div class="filter-group">
        <h3>Certification Status</h3>
        <div class="filter-options" id="filter-status"></div>
      </div>
      <div class="filter-group">
        <h3>Extensions</h3>
        <div class="filter-options" id="filter-extensions"></div>
      </div>
      <div class="filter-group">
        <h3>Options</h3>
        <div class="filter-options" id="filter-options"></div>
      </div>
    </div>

    <div class="results-info">
      <span id="results-count"></span>
    </div>

    <div class="table-wrapper">
      <table id="mds-table">
        <thead>
          <tr>
            <th class="col-icon"></th>
            <th class="col-description sortable" data-col="description">Description <span class="sort-icon">↕</span></th>
            <th class="col-protocol sortable" data-col="protocol">Protocol <span class="sort-icon">↕</span></th>
            <th class="col-status sortable" data-col="status">Status <span class="sort-icon">↕</span></th>
            <th class="col-updated sortable" data-col="updated">Updated <span class="sort-icon">↕</span></th>
            <th class="col-extensions sortable" data-col="extensions">Extensions <span class="sort-icon">↕</span></th>
            <th class="col-options sortable" data-col="options">Options <span class="sort-icon">↕</span></th>
          </tr>
        </thead>
        <tbody id="table-body">
          <tr><td colspan="7" class="loading">Loading data…</td></tr>
        </tbody>
      </table>
    </div>

    <div id="device-modal" class="modal hidden" role="dialog" aria-modal="true">
      <div class="modal-backdrop" id="modal-backdrop"></div>
      <div class="modal-content" id="modal-content"></div>
    </div>
  </main>

  <footer>
    <p id="legal-header"></p>
  </footer>

  <script src="main.js"></script>
</body>
</html>
